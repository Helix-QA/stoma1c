<h1>Регистр сведений "Критические остатки"</h1>
<p>Данный регистр предназначен для хранения сведений о назначенных для различных <a href="Catalog.Склады/Help">складов</a> минимальных, критических остатков <a href="Catalog.Номенклатура/Help">номенклатуры</a>.</p>
<p>Величины критических остатков назначаются индивидуально для каждого склада.</p></body></html>

<h1>Отчет "Дни рождения"</h1>
<p>Отчет позволяет получить сведения о клиентах, у которых день рождения приходится на указанный период. <br>Данные отчета группируются по <a href="Catalog.СтруктурныеЕдиницы/Help">структурной единице</a>, статусу клиента, <a href="Catalog.Контрагенты.Form.ФормаСпискаКлиенты/Help">клиенту</a>.</p>

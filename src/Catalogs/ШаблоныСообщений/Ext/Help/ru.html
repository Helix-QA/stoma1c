<h1>Справочник "Шаблоны сообщений"</h1>
<p class="Usual">Справочник предназначен для хранения списка шаблонов текстовых сообщений. В форме элемента справочника можно задать текстовое сообщение, которое в дальнейшем может быть использовано в качестве шаблона SMS, push или email для отправки из документа <a href="Document.РассылкаСообщений/Help">рассылки сообщений</a>.</p></body></html>

<h1>Справочник "Полисы медицинского страхования"</h1>
<p>Справочник предназначен для хранения всех имеющихся у <a href="Catalog.Контрагенты/Help">пациентов</a> полисов медицинского страхования.</p>
<p>Для каждого полиса должен быть указан его вид, срок его действия, а также страховая компания.</p></body></html>

<h1>Отчет "Пациенты, посетившие клинику за период"</h1>
<p>Отчет предоставляет сведения о <font color="#0066cc">пациентах</font>  посетивших клинику за определенный период времени.</p>
<p>Отчет содержит информацию о общем количестве пациентов, об количестве первичных клиентов, общем количестве посещений, суммы оказанных и оплаченных услуг.</p>

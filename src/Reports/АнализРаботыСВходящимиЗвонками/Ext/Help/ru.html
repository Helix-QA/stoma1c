<h1>Отчет "Анализ работы с входящими звонками"</h1>
<p>Отчет предоставляет сведения о зарегистрированных входящих звонках и результатах разговора.</p>
<p>Если в результате звонка была сформирована запись на прием, то она отобразится в соответствующей колонке.</p>

<h1>Оценки приёмов</h1>
<p>Регистр предназначен для хранения оценок приёмов пациентами.</p>
<h4>Реквизиты:</h4>
<ul><li><strong>Пациент</strong> - ссылка на пациента, посетившего клинику. 
</li>
<li><strong>Приём </strong>- документ приёма пациента. 
</li>
<li><strong>Оценка</strong> - оценка приёма. 
</li>
<li><strong>Комментарий</strong> - описание изменений.</li></ul></body></html>

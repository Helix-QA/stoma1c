<h1>Справочник "Источники информации"</h1>
<p>Данный справочник предназначен для хранения и редактирования всех источников информации, благодаря которым пациенты могут узнать о клинике.</p>
<p>Значения данного справочника используются для указания источника информации при заполнении информации о <a href="Catalog.Контрагенты/Help">пациентах</a>.</p></body></html>

<h1>Регистр сведений "Время работы сотрудников план"</h1>
<p>Данный регистр сведений предназначен для хранения данных о планируемом времени работы сотрудников организации. Планируемое время работы сотрудников определяется при помощи обработки <a href="DataProcessor.ГрафикРаботыСотрудников/Help">График работы сотрудников</a>.</p></body></html>

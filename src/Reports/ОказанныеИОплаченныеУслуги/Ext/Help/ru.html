<h1>Отчет "Оказанные и оплаченные услуги"</h1>
<p>Данный отчет предоставляет данные о оказанных или оплаченных услугах за выбранный период.</p>
<p>Результат группируется по врачу и номенклатуре.</p>
<p>Данный отчет удобно использовать для проверки базы для начисления зарплаты врачу.</p>

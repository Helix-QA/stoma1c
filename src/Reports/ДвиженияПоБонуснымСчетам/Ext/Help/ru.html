<h1>Отчет "Движения по бонусным счетам"</h1>
<p>Отчет позволяет получить сведения о зачислениях на бонусные счета, списаниях и конечном остатке всех бонусных счетов пациентов. </p>
<p>Данные отчета группируются по бонусному счету, пациенту и документу движения.</p>

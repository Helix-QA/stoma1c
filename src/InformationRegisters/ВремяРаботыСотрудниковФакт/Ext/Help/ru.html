<p>Регистр сведений "Время работы сотрудников факт"</p>
<p>Данный регистр сведений предназначен для хранения значений о времени, которое было фактически отработано сотрудниками организации. Данные о фактически отработанном сотрудниками времени получаются по результат проведения документов <a href="Document.ЕжедневныйОтчет/Help">Ежедневный отчет</a>.</p></body></html>

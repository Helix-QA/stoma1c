<h1>Отчет "Планируемые оплаты"</h1>
<p>Отчет предоставляет сведения о неоплаченных  утвержденных планах-лечения и наряд-заказах.</p>
<p>Отчет содержит информацию о сумме планируемой оплаты, сумме фактической оплаты и остатке оплаты.</p>

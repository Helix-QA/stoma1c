<h1>Отчет "Взаиморасчеты подробно"</h1>
<p>Данный отчет вызывается из формы клиента и отображает подробные взаиморасчеты с итогами по дням.</p>
<p>В конце отчета выводится история операций в разрезе видов взаиморасчетов: долг, аванс, лицевой счет.</p></body></html>

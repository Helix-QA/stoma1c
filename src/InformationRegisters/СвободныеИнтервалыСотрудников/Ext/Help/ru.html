<h1>Регистр сведений "Свободные интервалы сотрудников"</h1>
<p>Регистр предназначен для хранения интервалов рабочего времени сотрудников, не занятого визитами. Используется для оптимизации Api.</p>
<p>Интервалы хранятся только для будущих периодов. Неактуальные записи в регистре очищаются регламентом.</p></body></html>

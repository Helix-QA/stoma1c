<h1>Журнал "Документы по кассе/банку"</h1>
<p>Журнал <strong>Документы по кассе/банку</strong> содержит документы учета наличных/безналичных денежных средств. Переключение вида денежных средств производится по нажатию на переключатель <strong>Касса</strong>/<strong>Банк</strong>.</p></body></html>

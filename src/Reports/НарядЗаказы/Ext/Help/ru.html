<h1>Отчет "Наряд-Заказы"</h1>
<p>Отчет предназначен для анализа <a href="Document.НарядЗаказ/Help">наряд-заказов</a>.</p>
<p>Наряд-заказы группируются по статусам (выполнено, заказано, в работе). Для каждого заказа указывается перечисленная в нем <a href="Catalog.Номенклатура/Help"><font color="#0066cc">номенклатура</font></a>  количество, стоимость закупки и стоимость продажи.</p>

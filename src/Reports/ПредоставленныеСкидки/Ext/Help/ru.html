<h1>Отчет "Предоставленные скидки"</h1>
<p>Данный отчет предоставляет сведения обо всех скидках, которые были предоставлены <a href="Catalog.Контрагенты.Form.ФормаСпискаКлиенты/Help">пациентам</a>.</p>
<p>Отчет формируется на заданный период. Данные отчета группируются по <a href="Catalog.СтруктурныеЕдиницы/Help">клинике</a>, скидке, <a href="Catalog.Номенклатура/Help">номенклатуре</a>.</p>

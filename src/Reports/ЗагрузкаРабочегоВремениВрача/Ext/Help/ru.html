<h1>Отчет "Загрузка рабочего времени врачей"</h1>
<p>Отчет анализирует плановое рабочее время врача и время начала и окончания каждого приема, исходя из этих данных вычисляется процент загрузки.</p>
<p>Данные представлены в сводной таблице и трех диаграммах :</p>

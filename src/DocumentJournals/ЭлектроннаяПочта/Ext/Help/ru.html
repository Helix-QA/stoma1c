<h1>Журнал документов "Почта"</h1>
<p>Журнал предназначен для получения, просмотра и отправки электронных писем через встроенный почтовый клиент программы.</p>
<p>Переход к журналу производится из раздела <strong>"Календарь и почта"</strong> / <strong>Панель навигации</strong> / <strong>"Менеджер почты"</strong>.</p></body></html>
